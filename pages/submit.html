<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit - Phantom Forces Tech</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
    <nav class="pf-nav">
        <div class="pf-logo">
            <div class="pf-logo-icon"><i class="ti ti-bolt"></i></div>
            Phantom Forces Tech
        </div>
        <div class="pf-nav-links">
            <a href="techs.html" class="nav-link">Techs</a>
            <a href="glitches.html" class="nav-link">Glitches</a>
            <a href="tutorials.html" class="nav-link">Tutorials</a>
            <a href="showcases.html" class="nav-link">Showcases</a>
            <a href="submit.html" class="nav-link active">Submit</a>
        </div>
        <div class="pf-nav-actions">
            <a href="submit.html" class="btn-submit"><i class="ti ti-plus"></i> Submit</a>
            <a href="https://discord.gg/G75a9aZKWp" class="btn-discord"><i class="ti ti-brand-discord"></i> Discord</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Submit to the Archive</h1>
        <p>Got a cool tech, glitch, or showcase? Submit it here for review!</p>
    </div>

    <section class="section">
        <div class="submit-card">
            <form id="submitForm">
                <div class="form-group">
                    <label class="form-label">Your Name / Alias</label>
                    <input type="text" class="form-input" name="name" placeholder="e.g. ShadowSniper" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Submission Type</label>
                    <select class="form-select" name="type" required>
                        <option value="Tech">Tech</option>
                        <option value="Glitch">Glitch</option>
                        <option value="Tutorial">Tutorial</option>
                        <option value="Showcase">Showcase</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input" name="title" placeholder="e.g. Quickscope 360 No Scope" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Map</label>
                    <select class="form-select" name="map" required>
                        <option value="" disabled selected>Select a map...</option>
                        <option value="Bazaar">Bazaar</option>
                        <option value="Black Site">Black Site</option>
                        <option value="Capot">Capot</option>
                        <option value="Castle Keep">Castle Keep</option>
                        <option value="Containers">Containers</option>
                        <option value="Crane Site">Crane Site</option>
                        <option value="Derrick">Derrick</option>
                        <option value="Desert Storm">Desert Storm</option>
                        <option value="Dual Crane Site">Dual Crane Site</option>
                        <option value="Dunes">Dunes</option>
                        <option value="Dust Bowl">Dust Bowl</option>
                        <option value="Elevation">Elevation</option>
                        <option value="Facility">Facility</option>
                        <option value="Favela">Favela</option>
                        <option value="Fortress">Fortress</option>
                        <option value="Foxholes">Foxholes</option>
                        <option value="Heat">Heat</option>
                        <option value="Height">Height</option>
                        <option value="Highway Lot">Highway Lot</option>
                        <option value="Marooned">Marooned</option>
                        <option value="Metro Classic">Metro Classic</option>
                        <option value="Metro ( 2025 )">Metro ( 2025 )</option>
                        <option value="Mirage">Mirage</option>
                        <option value="Paradise">Paradise</option>
                        <option value="Penthouse">Penthouse</option>
                        <option value="Ravod 911">Ravod 911</option>
                        <option value="Rig">Rig</option>
                        <option value="Ruins">Ruins</option>
                        <option value="Rundown">Rundown</option>
                        <option value="Second Storm">Second Storm</option>
                        <option value="Stardom">Stardom</option>
                        <option value="Suburbia">Suburbia</option>
                        <option value="Transit">Transit</option>
                        <option value="Trench">Trench</option>
                        <option value="Villa">Villa</option>
                        <option value="Warehouse">Warehouse</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" name="desc" placeholder="Explain how it works or what happens..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Video Link (YouTube, etc.)</label>
                    <input type="url" class="form-input" name="video" placeholder="https://youtube.com/..." required>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Submit for Review</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        © 2026 Phantom Forces Tech · Made by the community, for the community
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        document.getElementById('submitForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const toast = document.getElementById('toast');
            
            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            try {
                const formData = new FormData(form);
                
                // REPLACE THIS with your actual Google Apps Script Web App URL
                const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMKOcKID6Uc4_c9L_5oJdI472gJPc93lLNQQ9PlZsEcCpTvz7Tf6QgwHbV0IENFeL4/exec';
                
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors'
                });
                
                // Show success message
                showToast('Success! Your submission is pending review.', 'success');
                form.reset();
            } catch (error) {
                console.error('Error:', error);
                showToast('Error submitting. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit for Review';
            }
        });
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'success' ? 'var(--success-bg)' : 'var(--warning-bg)';
            toast.style.color = type === 'success' ? 'var(--success-text)' : 'var(--warning-text)';
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
