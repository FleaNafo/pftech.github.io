<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Tech or Showcase</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">PF Tech Archive</a>
        <div class="nav-links">
            <a href="tech.html">Techs</a>
            <a href="glitches.html">Glitches</a>
            <a href="tutorials.html">Tutorials</a>
            <a href="showcase.html">Showcases</a>
            <a href="submit.html" class="active">Submit</a>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1><i class="ti ti-send"></i> Submit to the Archive</h1>
            <p>Got a cool tech, glitch, or showcase? Submit it here for review!</p>
        </header>

        <div class="form-container">
            <!-- NOTE: Update the 'action' URL to your actual Google Apps Script endpoint -->
            <form id="submitForm" action="YOUR_GOOGLE_APPS_SCRIPT_URL_HERE" method="POST">
                
                <div class="form-group">
                    <label for="name">Your Name / Alias</label>
                    <input type="text" id="name" name="name" placeholder="e.g. ShadowSniper" required>
                </div>

                <div class="form-group">
                    <label for="type">Submission Type</label>
                    <select id="type" name="type" required>
                        <option value="Tech">Tech</option>
                        <option value="Glitch">Glitch</option>
                        <option value="Tutorial">Tutorial</option>
                        <option value="Showcase">Showcase</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="e.g. Quickscope 360 No Scope" required>
                </div>

                <!-- UPDATED: Exact PF Maps Dropdown -->
                <div class="form-group">
                    <label for="map">Map</label>
                    <select id="map" name="map" required>
                        <option value="" disabled selected>Select a map...</option>
                        <option value="Bazaar">Bazaar</option>
                        <option value="Black Site">Black Site</option>
                        <option value="Capot">Capot</option>
                        <option value="Castle Keep">Castle Keep</option>
                        <option value="Containers">Containers</option>
                        <option value="Crane Site">Crane Site</option>
                        <option value="Derrick">Derrick</option>
                        <option value="Desert Storm">Desert Storm</option>
                        <option value="Dual Crane Site">Dual Crane Site</option>
                        <option value="Dunes">Dunes</option>
                        <option value="Dust Bowl">Dust Bowl</option>
                        <option value="Elevation">Elevation</option>
                        <option value="Facility">Facility</option>
                        <option value="Favela">Favela</option>
                        <option value="Fortress">Fortress</option>
                        <option value="Foxholes">Foxholes</option>
                        <option value="Heat">Heat</option>
                        <option value="Height">Height</option>
                        <option value="Highway Lot">Highway Lot</option>
                        <option value="Marooned">Marooned</option>
                        <option value="Metro Classic">Metro Classic</option>
                        <option value="Metro ( 2025 )">Metro ( 2025 )</option>
                        <option value="Mirage">Mirage</option>
                        <option value="Paradise">Paradise</option>
                        <option value="Penthouse">Penthouse</option>
                        <option value="Ravod 911">Ravod 911</option>
                        <option value="Rig">Rig</option>
                        <option value="Ruins">Ruins</option>
                        <option value="Rundown">Rundown</option>
                        <option value="Second Storm">Second Storm</option>
                        <option value="Stardom">Stardom</option>
                        <option value="Suburbia">Suburbia</option>
                        <option value="Transit">Transit</option>
                        <option value="Trench">Trench</option>
                        <option value="Villa">Villa</option>
                        <option value="Warehouse">Warehouse</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="desc">Description</label>
                    <textarea id="desc" name="desc" rows="4" placeholder="Explain how it works or what happens..."></textarea>
                </div>

                <div class="form-group">
                    <label for="video">Video Link (YouTube, etc.)</label>
                    <input type="url" id="video" name="video" placeholder="https://youtube.com/..." required>
                </div>

                <button type="submit" class="btn-submit">Submit for Review</button>
            </form>
            <p id="formMessage" class="form-message"></p>
        </div>
    </main>

    <script>
        // Basic form submission handler
        document.getElementById('submitForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const msg = document.getElementById('formMessage');
            msg.textContent = "Submitting...";
            msg.className = "form-message info";

            try {
                const formData = new FormData(form);
                await fetch(form.action, { method: 'POST', body: formData, mode: 'no-cors' });
                msg.textContent = "Success! Your submission is pending review.";
                msg.className = "form-message success";
                form.reset();
            } catch (err) {
                msg.textContent = "Error submitting. Please try again.";
                msg.className = "form-message error";
            }
        });
    </script>
</body>
</html>
