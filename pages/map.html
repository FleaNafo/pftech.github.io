<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map - Phantom Forces Tech</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="../assets/shared.css" />
</head>
<body>
<nav class="pf-nav">
  <a href="../index.html" class="pf-logo">
    <div class="pf-logo-icon"><i class="ti ti-bolt"></i></div>
    Phantom Forces Tech
  </a>
  <div class="pf-nav-links">
    <a class="nav-link" href="techs.html" data-page="techs">Techs</a>
    <a class="nav-link" href="glitches.html" data-page="glitches">Glitches</a>
    <a class="nav-link" href="tutorials.html" data-page="tutorials">Tutorials</a>
    <a class="nav-link" href="showcases.html" data-page="showcases">Showcases</a>
    <a class="nav-link" href="submit.html" data-page="submit">Submit</a>
  </div>
  <div class="pf-nav-actions">
    <a class="btn-submit" href="submit.html"><i class="ti ti-upload"></i> Submit</a>
    <a class="btn-discord" href="https://discord.gg/G75a9aZKWp" target="_blank" rel="noopener"><i class="ti ti-brand-discord"></i> Discord</a>
  </div>
</nav>

<div class="map-hero">
  <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;"><a href="../index.html" style="color:var(--accent)">Home</a> → Maps</div>
  <h1 id="map-title">Loading...</h1>
  <p id="map-subtitle" style="color:var(--text-secondary);font-size:14px;margin-top:4px;"></p>
</div>

<div class="section">
  <div class="map-type-tabs" id="map-tabs">
    <button class="map-tab active" onclick="filterMapType('all', this)">All</button>
    <button class="map-tab" onclick="filterMapType('Tech', this)">Techs</button>
    <button class="map-tab" onclick="filterMapType('Glitch', this)">Glitches</button>
    <button class="map-tab" onclick="filterMapType('Tutorial', this)">Tutorials</button>
    <button class="map-tab" onclick="filterMapType('Video showcase', this)">Showcases</button>
  </div>
  <div id="pf-toolbar" class="toolbar"></div>
  <div id="submissions-list" class="submissions-list">
    <div class="loading-state"><i class="ti ti-loader"></i> Loading...</div>
  </div>
</div>

<div class="footer">© 2026 Phantom Forces Tech · Made by the community, for the community</div>
<div class="toast" id="toast"></div>
<script src="../assets/shared.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const mapName = params.get('map') || 'Unknown Map';
  let activeTypeFilter = 'all';

  document.getElementById('map-title').textContent = mapName;

  document.addEventListener('DOMContentLoaded', async () => {
    setActiveNav('');
    await loadSubmissions(null, mapName);
    const count = allSubmissions.filter(s => s.map === mapName).length;
    document.getElementById('map-subtitle').textContent = `${count} submission${count !== 1 ? 's' : ''} for this map`;
    document.title = `${mapName} - Phantom Forces Tech`;
  });

  function filterMapType(type, btn) {
    activeTypeFilter = type;
    document.querySelectorAll('.map-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    const el = document.getElementById('submissions-list');
    let subs = allSubmissions.filter(s => s.map === mapName);
    if (type !== 'all') subs = subs.filter(s => s.type === type);
    const filtered = applyFilters(subs);
    if (filtered.length === 0) {
      el.innerHTML = `<div class="empty-state">No ${type === 'all' ? '' : type.toLowerCase() + ' '}submissions for ${mapName} yet.</div>`;
    } else {
      el.innerHTML = filtered.map(renderCard).join('');
    }
  }
</script>
</body>
</html>
